name: Deploy to Neocities

on:
  push:
    branches:
      - main
    paths:
      - 'data/products.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate static site
        run: npm run generate-site

      - name: Deploy to Neocities
        run: node scripts/deployNeocities.js
        env:
          NEOCITIES_API_TOKEN: ${{ secrets.NEOCITIES_API_TOKEN }}
